databases:
  - name: compliance-checker-db
    databaseName: compliance_checker
    user: compliance_user
    plan: free

services:
  - type: web
    name: compliance-checker-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: compliance-checker-db
          property: connectionString
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: QWEN_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: compliance-checker-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
